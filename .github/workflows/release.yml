name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, ad-hoc sign, and release
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate release tag
        id: metadata
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[1-9][0-9]*$ ]]; then
            echo "Release tags must use vYYYY.MM.DD.N format." >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="${VERSION%.*}"
          PARSED_APP_VERSION="$(/bin/date -j -f '%Y.%m.%d' \
            "$APP_VERSION" '+%Y.%m.%d' 2>/dev/null || true)"
          if [[ "$PARSED_APP_VERSION" != "$APP_VERSION" ]]; then
            echo "Release tag contains an invalid calendar date: $APP_VERSION" >&2
            exit 1
          fi
          PLIST_VERSION="$(/usr/libexec/PlistBuddy \
            -c 'Print :CFBundleShortVersionString' Support/Info.plist)"
          if [[ "$PLIST_VERSION" != "$APP_VERSION" ]]; then
            echo "Tag date $APP_VERSION does not match Info.plist $PLIST_VERSION." >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test

      - name: Build, ad-hoc sign, and package
        run: |
          CODE_SIGN_IDENTITY=- \
            APP_BUILD="$GITHUB_RUN_NUMBER" \
            Scripts/package-release.sh "$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=(
            "dist/miniTools-$VERSION.zip"
            "dist/miniTools-$VERSION.zip.sha256"
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${FILES[@]}" --clobber
          else
            NOTES="$RUNNER_TEMP/release-notes.md"
            printf '%s\n\n%s\n' \
              'This build is ad-hoc signed and is not notarized by Apple.' \
              'If macOS blocks the first launch, open **System Settings → Privacy & Security** and choose **Open Anyway** for miniTools. Accessibility permission is required for Safari window switching and window management; mouse side-button bindings also require Input Monitoring.' \
              > "$NOTES"

            gh release create "$GITHUB_REF_NAME" "${FILES[@]}" \
              --verify-tag \
              --title "miniTools $VERSION" \
              --generate-notes \
              --notes-file "$NOTES"
          fi
