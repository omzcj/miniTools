name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Sign, notarize, and release
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate release tag
        id: metadata
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vX.Y.Z format." >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          PLIST_VERSION="$(/usr/libexec/PlistBuddy \
            -c 'Print :CFBundleShortVersionString' Support/Info.plist)"
          if [[ "$PLIST_VERSION" != "$VERSION" ]]; then
            echo "Tag version $VERSION does not match Info.plist $PLIST_VERSION." >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          : "${DEVELOPER_ID_CERTIFICATE_BASE64:?Configure the certificate secret.}"
          : "${DEVELOPER_ID_CERTIFICATE_PASSWORD:?Configure the certificate password.}"
          : "${APPLE_API_KEY_ID:?Configure the App Store Connect API key ID.}"
          : "${APPLE_API_ISSUER_ID:?Configure the App Store Connect issuer ID.}"
          : "${APPLE_API_PRIVATE_KEY:?Configure the App Store Connect private key.}"
          : "${HOMEBREW_TAP_TOKEN:?Configure the Homebrew Tap token.}"

          KEYCHAIN_PATH="$RUNNER_TEMP/miniTools-build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          PRIVATE_KEY_PATH="$RUNNER_TEMP/AuthKey_$APPLE_API_KEY_ID.p8"

          printf '%s' "$DEVELOPER_ID_CERTIFICATE_BASE64" |
            /usr/bin/base64 -D > "$CERTIFICATE_PATH"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$PRIVATE_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          SIGN_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" |
            awk -F '"' '/Developer ID Application:/ { print $2; exit }')"
          if [[ -z "$SIGN_IDENTITY" ]]; then
            echo "Developer ID Application identity was not found in the certificate." >&2
            exit 1
          fi

          echo "CODE_SIGN_IDENTITY=$SIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER_ID=$APPLE_API_ISSUER_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_PRIVATE_KEY_PATH=$PRIVATE_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, and notarize
        run: |
          APP_BUILD="$GITHUB_RUN_NUMBER" \
            Scripts/package-release.sh "$VERSION"

      - name: Attest release archive
        uses: actions/attest@v4
        with:
          subject-path: dist/miniTools-${{ steps.metadata.outputs.version }}.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=(
            "dist/miniTools-$VERSION.zip"
            "dist/miniTools-$VERSION.zip.sha256"
            "dist/minitools.rb"
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${FILES[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${FILES[@]}" \
              --verify-tag \
              --title "miniTools $VERSION" \
              --generate-notes
          fi

      - name: Check out Homebrew Tap
        uses: actions/checkout@v6
        with:
          repository: omzcj/homebrew-omzcj
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-omzcj

      - name: Publish Homebrew cask
        run: |
          install -m 0644 dist/minitools.rb homebrew-omzcj/Casks/minitools.rb
          cd homebrew-omzcj
          git config user.name "张朝杰"
          git config user.email "735892586@qq.com"
          git add Casks/minitools.rb
          if git diff --cached --quiet; then
            echo "Homebrew cask already matches miniTools $VERSION."
            exit 0
          fi
          git commit -m "Update miniTools to $VERSION"
          git push origin HEAD:main

      - name: Remove temporary signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/miniTools-build.keychain-db" || true
          rm -f \
            "$RUNNER_TEMP/developer-id.p12" \
            "$RUNNER_TEMP"/AuthKey_*.p8
